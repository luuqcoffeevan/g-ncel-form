<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LUUQ | QR</title>
    <link rel="icon" href="logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="qr-only">
    <main class="qr-only__wrap">
      <section class="qr-only__card">
        <div class="qr-only__head">
          <div class="brand">
            <span class="brand-mark">
              <img class="brand-logo" src="logo.png" alt="LUUQ logo" />
            </span>
          </div>
          <span class="qr-only__badge">Hızlı Erişim</span>
        </div>

        <div class="qr-only__content">
          <div>
            <h1 class="qr-only__title">Geri Bildirim Formu</h1>
            <p class="intro">QR okutulduğunda form otomatik açılır.</p>
            <p class="qr-only__hint">Kamera ile taratabilir veya doğrudan formu açabilirsiniz.</p>
          </div>
        </div>

        <div class="qr-only__img">
          <img src="" alt="QR" data-qr-img />
        </div>

        <div class="qr-only__actions">
          <a class="btn" data-form-link target="_blank" rel="noopener">Formu Aç</a>
          <a class="btn ghost" data-qr-download download="luuq-qr.png">QR İndir</a>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
